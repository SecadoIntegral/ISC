
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Industrias San Carlos · Sistema de Precios</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
    }

    body {
      background: #f4f7fc;
      color: #1e293b;
      transition: background 0.3s, color 0.3s;
      min-height: 100vh;
      padding: 1.5rem 1.5rem 4rem;
    }

    body.dark {
      background: #0b1a2b;
      color: #e2e8f0;
    }

    .container {
      max-width: 1440px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem 1.8rem;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      padding: 1rem 2rem;
      border-radius: 48px;
      box-shadow: 0 8px 24px rgba(0, 20, 40, 0.08);
      margin-bottom: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.3);
      transition: background 0.3s;
    }

    body.dark .header {
      background: rgba(16, 34, 58, 0.7);
      border-color: rgba(255, 255, 255, 0.05);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-area img {
      height: 48px;
      width: auto;
      border-radius: 10px;
      object-fit: contain;
      background: white;
      padding: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-text .brand {
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.5px;
      color: #0b2b4a;
    }

    body.dark .logo-text .brand {
      color: #b6d4f0;
    }

    .logo-text .sub {
      font-size: 0.75rem;
      font-weight: 400;
      color: #3b5f7a;
      letter-spacing: 0.3px;
    }

    body.dark .logo-text .sub {
      color: #95b3cf;
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .theme-toggle {
      background: rgba(0,0,0,0.04);
      border: none;
      border-radius: 40px;
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      font-weight: 500;
      color: #1a3a55;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      transition: 0.2s;
    }

    body.dark .theme-toggle {
      background: #1e3a5a;
      color: #d0e2f5;
    }

    .theme-toggle i {
      font-size: 1.1rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
      background: rgba(255,255,255,0.3);
      backdrop-filter: blur(4px);
      padding: 1.2rem 1.8rem;
      border-radius: 40px;
      border: 1px solid rgba(255,255,255,0.4);
    }

    body.dark .stats-grid {
      background: rgba(10, 30, 50, 0.5);
      border-color: rgba(255,255,255,0.05);
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 500;
    }

    .stat-item i {
      color: #1f6390;
      font-size: 1.2rem;
      width: 1.8rem;
      text-align: center;
    }

    body.dark .stat-item i {
      color: #5f9ed0;
    }

    .stat-value {
      font-weight: 700;
      font-size: 1.2rem;
      margin-right: 0.2rem;
    }

    .search-section {
      background: white;
      padding: 1.5rem 2rem;
      border-radius: 40px;
      box-shadow: 0 8px 24px rgba(0, 20, 40, 0.06);
      margin-bottom: 2rem;
      transition: background 0.3s;
    }

    body.dark .search-section {
      background: #102b41;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .search-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
    }

    .search-input-wrap {
      flex: 2;
      min-width: 200px;
      position: relative;
    }

    .search-input-wrap i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #6b8ba0;
    }

    .search-input-wrap input {
      width: 100%;
      padding: 0.8rem 1rem 0.8rem 3rem;
      border: 1px solid #dce7f2;
      border-radius: 60px;
      font-size: 1rem;
      background: #f5f9ff;
      transition: 0.2s;
    }

    body.dark .search-input-wrap input {
      background: #1b3853;
      border-color: #2f5270;
      color: #eaf1f9;
    }

    .search-input-wrap input:focus {
      outline: none;
      border-color: #1f6390;
      box-shadow: 0 0 0 3px rgba(31, 99, 144, 0.15);
    }

    .filter-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      align-items: center;
      flex: 1;
    }

    .filter-group select {
      padding: 0.7rem 1.2rem;
      border-radius: 60px;
      border: 1px solid #d0dfec;
      background: white;
      font-size: 0.9rem;
      cursor: pointer;
      min-width: 150px;
    }

    body.dark .filter-group select {
      background: #1d3a53;
      border-color: #335a78;
      color: #e4edf5;
    }

    .filter-group select:focus {
      outline: none;
      border-color: #1f6390;
    }

    .btn-clear {
      background: #eef3f9;
      border: none;
      padding: 0.7rem 1.5rem;
      border-radius: 60px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      color: #1a3a55;
      white-space: nowrap;
    }

    body.dark .btn-clear {
      background: #274b68;
      color: #d0e2f0;
    }

    .btn-clear:hover {
      background: #d5e2f0;
    }

    .sort-select {
      margin-left: auto;
    }

    .sort-select select {
      padding: 0.7rem 1.2rem;
      border-radius: 60px;
      border: 1px solid #d0dfec;
      background: white;
      font-size: 0.9rem;
      cursor: pointer;
    }

    body.dark .sort-select select {
      background: #1d3a53;
      border-color: #335a78;
      color: #e4edf5;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.8rem;
      margin-top: 1.5rem;
    }

    .card {
      background: white;
      border-radius: 28px;
      padding: 1.6rem 1.8rem;
      box-shadow: 0 12px 30px rgba(0, 20, 40, 0.08);
      transition: transform 0.2s, box-shadow 0.2s, background 0.3s;
      border: 1px solid rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(2px);
      animation: fadeUp 0.4s ease;
    }

    body.dark .card {
      background: #12324b;
      border-color: #1f4665;
      box-shadow: 0 12px 30px rgba(0,0,0,0.6);
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 36px rgba(0, 20, 40, 0.12);
    }

    .card .article {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 0.3rem;
      color: #0d2c47;
    }

    body.dark .card .article {
      color: #cde1f5;
    }

    .card .price-unit {
      font-size: 1.8rem;
      font-weight: 700;
      color: #0b6b4c;
      background: #e4f3ec;
      display: inline-block;
      padding: 0.1rem 1rem;
      border-radius: 60px;
      margin: 0.5rem 0 0.8rem;
    }

    body.dark .card .price-unit {
      background: #1a4f3d;
      color: #9bddc4;
    }

    .card .detail-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      padding: 0.3rem 0;
      border-bottom: 1px solid #eaf0f6;
    }

    body.dark .card .detail-row {
      border-color: #264c68;
    }

    .card .detail-row span:last-child {
      font-weight: 500;
    }

    .card-actions {
      margin-top: 1rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .card-actions button {
      background: transparent;
      border: 1px solid #cbddee;
      padding: 0.3rem 0.9rem;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.15s;
      color: #1a3a55;
    }

    body.dark .card-actions button {
      border-color: #35658a;
      color: #c7dff5;
    }

    .card-actions button:hover {
      background: #dce8f5;
    }

    .analysis-panel {
      margin-top: 2.5rem;
      background: white;
      border-radius: 40px;
      padding: 1.8rem 2.2rem;
      box-shadow: 0 8px 28px rgba(0,0,0,0.04);
      transition: background 0.3s;
    }

    body.dark .analysis-panel {
      background: #0e2a41;
    }

    .analysis-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      margin: 1rem 0 1.5rem;
    }

    .analysis-item {
      background: #f2f8ff;
      padding: 0.8rem 1.2rem;
      border-radius: 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    body.dark .analysis-item {
      background: #1d3f5b;
    }

    .analysis-item .label {
      font-weight: 400;
      color: #3b607b;
    }

    body.dark .analysis-item .label {
      color: #acc9e0;
    }

    .analysis-item .value {
      font-weight: 700;
    }

    .history-timeline {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-top: 1rem;
    }

    .history-item {
      background: #f2f8fe;
      padding: 0.8rem 1.4rem;
      border-radius: 60px;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1.8rem;
      border-left: 4px solid #256f9c;
      font-size: 0.9rem;
    }

    body.dark .history-item {
      background: #1b3f5a;
      border-left-color: #4d91c0;
    }

    .history-item .date {
      font-weight: 500;
      color: #1c4f72;
    }

    body.dark .history-item .date {
      color: #b3d6f0;
    }

    .loader-overlay {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 4rem 1rem;
      flex-direction: column;
      gap: 1rem;
    }

    .loader {
      width: 50px;
      height: 50px;
      border: 5px solid #d0dfec;
      border-top: 5px solid #1f6390;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .no-results {
      text-align: center;
      padding: 3rem;
      font-size: 1.2rem;
      color: #3e6b88;
    }

    body.dark .no-results {
      color: #a8c8e0;
    }

    .fade-in { animation: fadeUp 0.4s ease; }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .back-top {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: #1f6390;
      color: white;
      border: none;
      border-radius: 60px;
      padding: 0.7rem 1.2rem;
      font-weight: 600;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: 0.2s;
      z-index: 99;
    }

    .back-top:hover { background: #104a6e; transform: scale(1.03); }

    @media (max-width: 700px) {
      .header { flex-direction: column; align-items: stretch; }
      .header-actions { margin-left: 0; justify-content: flex-end; }
      .stats-grid { grid-template-columns: repeat(2,1fr); }
      .search-section { padding: 1.2rem; }
      .search-bar { flex-direction: column; align-items: stretch; }
      .filter-group { flex-direction: column; align-items: stretch; }
      .sort-select { margin-left: 0; }
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #e2ecf5; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #256f9c; border-radius: 10px; }
  </style>
</head>
<body>
<div class="container" id="app">
  <header class="header">
    <div class="logo-area">
      <img src="logo.jpeg" alt="Industrias San Carlos" id="logoImg" onerror="this.style.display='none'">
      <div class="logo-text">
        <span class="brand">Industrias San Carlos</span>
        <span class="sub"><i class="fas fa-chart-line" style="margin-right:4px;"></i>Sistema Inteligente de Consulta de Precios</span>
      </div>
    </div>
    <div class="header-actions">
      <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i> <span id="themeLabel">Modo oscuro</span></button>
      <span style="font-size:0.85rem; opacity:0.7;"><i class="fas fa-sync-alt fa-fw"></i> <span id="lastUpdateLabel">Actualizando...</span></span>
    </div>
  </header>

  <div class="stats-grid" id="statsGrid">
    <div class="stat-item"><i class="fas fa-cubes"></i><span><span class="stat-value" id="totalArticulos">0</span> artículos</span></div>
    <div class="stat-item"><i class="fas fa-file-invoice"></i><span><span class="stat-value" id="totalFacturas">0</span> facturas</span></div>
    <div class="stat-item"><i class="fas fa-building"></i><span><span class="stat-value" id="totalProveedores">0</span> proveedores</span></div>
    <div class="stat-item"><i class="fas fa-clock"></i><span><span class="stat-value" id="ultimaActualizacion">--</span></span></div>
  </div>

  <section class="search-section">
    <div class="search-bar">
      <div class="search-input-wrap">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Buscar por artículo...">
      </div>
      <div class="filter-group">
        <select id="filterProveedor">
          <option value="">Todos los proveedores</option>
        </select>
        <select id="filterFecha">
          <option value="">Todas las fechas</option>
        </select>
        <button class="btn-clear" id="clearFiltersBtn"><i class="fas fa-undo-alt"></i> Limpiar</button>
      </div>
      <div class="sort-select">
        <select id="sortSelect">
          <option value="reciente">Compra más reciente</option>
          <option value="antiguo">Compra más antigua</option>
          <option value="precioBajo">Precio más bajo</option>
          <option value="precioAlto">Precio más alto</option>
          <option value="alfabetico">Orden alfabético</option>
        </select>
      </div>
    </div>
  </section>

  <div id="cardsContainer">
    <div class="loader-overlay" id="loader"><div class="loader"></div><span>Cargando datos...</span></div>
    <div class="cards-grid" id="cardsGrid" style="display:none;"></div>
    <div class="no-results" id="noResults" style="display:none;"><i class="fas fa-search-minus" style="font-size:2rem; display:block; margin-bottom:0.5rem;"></i> No se encontraron resultados</div>
  </div>

  <div class="analysis-panel" id="analysisPanel" style="display:none;">
    <h3 style="display:flex; align-items:center; gap:0.5rem;"><i class="fas fa-chart-pie" style="color:#1f6390;"></i> Análisis de <span id="analysisArticleName" style="font-weight:700;">Artículo</span></h3>
    <div class="analysis-grid" id="analysisGrid"></div>
    <h4 style="margin:1rem 0 0.5rem;"><i class="fas fa-history"></i> Historial de compras</h4>
    <div class="history-timeline" id="historyTimeline"></div>
    <div style="margin-top:1.2rem; display:flex; gap:0.8rem; flex-wrap:wrap;">
      <button class="btn-clear" id="printCardBtn"><i class="fas fa-print"></i> Imprimir ficha</button>
      <button class="btn-clear" id="exportPdfBtn"><i class="fas fa-file-pdf"></i> Exportar PDF</button>
    </div>
  </div>

  <button class="back-top" id="backToTop"><i class="fas fa-arrow-up"></i> Arriba</button>
</div>
<script>
  (function() {
    "use strict";

    const DATA_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ7YBui32JBbGTNLfR4FIRHWvu9xP-GJFaEisdpvOvAxVJLv0AVw6-9pOMAb44UVA/pub?output=csv';

    const searchInput = document.getElementById('searchInput');
    const filterProveedor = document.getElementById('filterProveedor');
    const filterFecha = document.getElementById('filterFecha');
    const sortSelect = document.getElementById('sortSelect');
    const clearBtn = document.getElementById('clearFiltersBtn');
    const cardsGrid = document.getElementById('cardsGrid');
    const loader = document.getElementById('loader');
    const noResults = document.getElementById('noResults');
    const analysisPanel = document.getElementById('analysisPanel');
    const analysisArticleName = document.getElementById('analysisArticleName');
    const analysisGrid = document.getElementById('analysisGrid');
    const historyTimeline = document.getElementById('historyTimeline');
    const totalArticulos = document.getElementById('totalArticulos');
    const totalFacturas = document.getElementById('totalFacturas');
    const totalProveedores = document.getElementById('totalProveedores');
    const ultimaActualizacion = document.getElementById('ultimaActualizacion');
    const themeToggle = document.getElementById('themeToggle');
    const themeLabel = document.getElementById('themeLabel');
    const backToTop = document.getElementById('backToTop');

    let allData = [];
    let filteredData = [];
    let currentCardIndex = -1;

    function parseDate(str) {
      if (!str) return null;
      if (typeof str === 'string') {
        const parts = str.split('/');
        if (parts.length === 3) {
          const d = new Date(parts[2], parts[1]-1, parts[0]);
          if (!isNaN(d)) return d;
        }
        const d = new Date(str);
        if (!isNaN(d)) return d;
        const parts2 = str.split('-');
        if (parts2.length === 3) {
          const months = { 'ene':0, 'feb':1, 'mar':2, 'abr':3, 'may':4, 'jun':5, 'jul':6, 'ago':7, 'sep':8, 'oct':9, 'nov':10, 'dic':11 };
          const month = months[parts2[1].toLowerCase()];
          if (month !== undefined) {
            const d = new Date(parts2[2], month, parts2[0]);
            if (!isNaN(d)) return d;
          }
        }
      }
      return null;
    }

    function formatDate(d) {
      if (!d) return '—';
      if (typeof d === 'string') d = parseDate(d);
      if (!d || isNaN(d)) return '—';
      return d.toLocaleDateString('es-ES', {day:'2-digit', month:'short', year:'numeric'});
    }

    function formatDateForFilter(d) {
      if (!d) return '';
      if (typeof d === 'string') d = parseDate(d);
      if (!d || isNaN(d)) return '';
      return d.toLocaleDateString('es-ES', {day:'2-digit', month:'short', year:'numeric'});
    }

    function toCurrency(n) {
      if (n === undefined || n === null || isNaN(n)) return '—';
      return Number(n).toFixed(2);
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function getUniqueKey(item) {
      return `${item.articulo}|${item.empresa}|${item.factura}|${item.fecha}|${item.precioUnit}|${item.cantidad}`;
    }

    async function loadData() {
      try {
        const response = await fetch(DATA_URL);
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        const csv = await response.text();
        
        const lines = [];
        let currentLine = '';
        let insideQuotes = false;
        
        for (let i = 0; i < csv.length; i++) {
          const char = csv[i];
          if (char === '"') {
            insideQuotes = !insideQuotes;
            currentLine += char;
          } else if (char === '\n' && !insideQuotes) {
            if (currentLine.trim()) {
              lines.push(currentLine);
            }
            currentLine = '';
          } else {
            currentLine += char;
          }
        }
        if (currentLine.trim()) {
          lines.push(currentLine);
        }
        
        if (lines.length < 2) {
          throw new Error('No hay datos suficientes en el CSV');
        }
        
        const headers = parseCSVLine(lines[0]);
        
        const idx = {
          factura: headers.findIndex(h => /factura/i.test(h)),
          empresa: headers.findIndex(h => /empresa/i.test(h)),
          fecha: headers.findIndex(h => /fecha/i.test(h)),
          articulo: headers.findIndex(h => /art[íi]culo|producto|item/i.test(h)),
          cantidad: headers.findIndex(h => /cantidad/i.test(h)),
          unidad: headers.findIndex(h => /unidad/i.test(h)),
          precioUnit: headers.findIndex(h => /precio por unidad|precio unitario|precio.*unidad/i.test(h)),
          subtotal: headers.findIndex(h => /subtotal/i.test(h)),
          iva: headers.findIndex(h => /iva|impuesto/i.test(h)),
          total: headers.findIndex(h => /precio total|total/i.test(h))
        };
        
        const data = [];
        const seen = new Set();
        
        for (let i = 1; i < lines.length; i++) {
          const cols = parseCSVLine(lines[i]);
          if (cols.length < 2) continue;
          
          const get = (idx) => (idx >= 0 && idx < cols.length) ? cols[idx].trim() : '';
          
          const item = {
            factura: get(idx.factura),
            empresa: get(idx.empresa),
            fecha: get(idx.fecha),
            articulo: get(idx.articulo),
            cantidad: get(idx.cantidad),
            cantidadNumerica: parseFloat(get(idx.cantidad)) || 0,
            unidad: get(idx.unidad),
            precioUnit: parseFloat(get(idx.precioUnit)) || 0,
            subtotal: parseFloat(get(idx.subtotal)) || 0,
            iva: parseFloat(get(idx.iva)) || 0,
            total: parseFloat(get(idx.total)) || 0,
          };
          
          if (item.articulo && item.articulo.trim() !== '') {
            const key = getUniqueKey(item);
            if (!seen.has(key)) {
              seen.add(key);
              data.push(item);
            }
          }
        }
        
        return data;
      } catch (error) {
        console.error('Error loading data:', error);
        throw error;
      }
    }

    function parseCSVLine(line) {
      const result = [];
      let current = '';
      let insideQuotes = false;
      
      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === ',' && !insideQuotes) {
          result.push(current);
          current = '';
        } else {
          current += char;
        }
      }
      result.push(current);
      return result;
    }

    function populateFilters() {
      const proveedores = new Set();
      const fechas = new Set();
      
      allData.forEach(item => {
        if (item.empresa) proveedores.add(item.empresa);
        if (item.fecha) {
          const formatted = formatDateForFilter(item.fecha);
          if (formatted) fechas.add(formatted);
        }
      });

      filterProveedor.innerHTML = '<option value="">Todos los proveedores</option>';
      [...proveedores].sort().forEach(prov => {
        const option = document.createElement('option');
        option.value = prov;
        option.textContent = prov;
        filterProveedor.appendChild(option);
      });

      filterFecha.innerHTML = '<option value="">Todas las fechas</option>';
      [...fechas].sort((a, b) => {
        const da = parseDate(a);
        const db = parseDate(b);
        if (da && db) return db - da;
        return 0;
      }).forEach(fecha => {
        const option = document.createElement('option');
        option.value = fecha;
        option.textContent = fecha;
        filterFecha.appendChild(option);
      });
    }

    function renderCards(data) {
      cardsGrid.innerHTML = '';
      if (!data || data.length === 0) {
        cardsGrid.style.display = 'none';
        noResults.style.display = 'block';
        return;
      }
      noResults.style.display = 'none';
      cardsGrid.style.display = 'grid';
      data.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'card fade-in';
        card.dataset.index = index;
        card.innerHTML = `
          <div class="article">${escapeHtml(item.articulo)}</div>
          <div class="price-unit">${toCurrency(item.precioUnit)} ${item.unidad ? '/ '+escapeHtml(item.unidad) : ''}</div>
          <div class="detail-row"><span><i class="fas fa-building"></i> Empresa</span><span>${escapeHtml(item.empresa)}</span></div>
          <div class="detail-row"><span><i class="fas fa-calendar"></i> Fecha</span><span>${formatDate(item.fecha)}</span></div>
          <div class="detail-row">
    <span><i class="fas fa-hashtag"></i> Cantidad</span>
    <span>${escapeHtml(item.cantidad)}</span>
</div>

<div class="detail-row">
    <span><i class="fas fa-ruler"></i> Unidad de medida</span>
    <span>${escapeHtml(item.unidad)}</span>
</div>
          <div class="detail-row"><span><i class="fas fa-file-invoice"></i> Factura</span><span>${escapeHtml(item.factura)}</span></div>
          <div class="detail-row"><span><i class="fas fa-receipt"></i> Subtotal</span><span>${toCurrency(item.subtotal)}</span></div>
          <div class="detail-row"><span><i class="fas fa-percent"></i> IVA</span><span>${toCurrency(item.iva)}</span></div>
          <div class="detail-row"><span><i class="fas fa-coins"></i> Total</span><span>${toCurrency(item.total)}</span></div>
          <div class="card-actions">
            <button class="view-analysis" data-index="${index}"><i class="fas fa-chart-simple"></i> Análisis</button>
          </div>
        `;
        cardsGrid.appendChild(card);
      });

      document.querySelectorAll('.view-analysis').forEach(btn => {
        btn.addEventListener('click', function(e) {
          const idx = parseInt(this.dataset.index);
          if (!isNaN(idx) && idx < filteredData.length) {
            showAnalysis(idx);
          }
        });
      });
    }

    function showAnalysis(index) {
      const item = filteredData[index];
      if (!item) return;
      currentCardIndex = index;
      const articulo = item.articulo;
      const allSame = filteredData.filter(d => d.articulo.toLowerCase() === articulo.toLowerCase());
      if (allSame.length === 0) return;

      analysisArticleName.textContent = articulo;
      const prices = allSame.map(d => d.precioUnit).filter(p => p > 0);
      const min = Math.min(...prices);
      const max = Math.max(...prices);
      const avg = prices.reduce((a,b) => a+b, 0) / prices.length;
      const last = allSame[allSame.length-1];

      analysisGrid.innerHTML = `
        <div class="analysis-item"><span class="label">Precio más bajo</span><span class="value">${toCurrency(min)}</span></div>
        <div class="analysis-item"><span class="label">Precio más alto</span><span class="value">${toCurrency(max)}</span></div>
        <div class="analysis-item"><span class="label">Precio promedio</span><span class="value">${toCurrency(avg)}</span></div>
        <div class="analysis-item"><span class="label">Último precio</span><span class="value">${toCurrency(last.precioUnit)}</span></div>
        <div class="analysis-item"><span class="label">Última compra</span><span class="value">${formatDate(last.fecha)}</span></div>
        <div class="analysis-item"><span class="label">Veces comprado</span><span class="value">${allSame.length}</span></div>
      `;

      historyTimeline.innerHTML = '';
      const sorted = [...allSame].sort((a,b) => {
        const da = parseDate(a.fecha) || new Date(0);
        const db = parseDate(b.fecha) || new Date(0);
        return db - da;
      });
      sorted.forEach(h => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `<span class="date">${formatDate(h.fecha)}</span> <span>${escapeHtml(h.empresa)}</span> <span>${toCurrency(h.precioUnit)} ${escapeHtml(h.unidad)}</span> <span>Fact. ${escapeHtml(h.factura)}</span> <span>Cant. ${h.cantidad}</span>`;
        historyTimeline.appendChild(div);
      });

      analysisPanel.style.display = 'block';
      analysisPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function applyFiltersAndSort() {
      const search = searchInput.value.toLowerCase().trim();
      const proveedor = filterProveedor.value;
      const fecha = filterFecha.value;

      let filtered = allData.filter(item => {
        if (search && !item.articulo.toLowerCase().includes(search)) return false;
        if (proveedor && item.empresa !== proveedor) return false;
        if (fecha) {
          const itemFecha = formatDateForFilter(item.fecha);
          if (itemFecha !== fecha) return false;
        }
        return true;
      });

      const sortVal = sortSelect.value;
      if (sortVal === 'precioBajo') filtered.sort((a,b) => a.precioUnit - b.precioUnit);
      else if (sortVal === 'precioAlto') filtered.sort((a,b) => b.precioUnit - a.precioUnit);
      else if (sortVal === 'alfabetico') filtered.sort((a,b) => a.articulo.localeCompare(b.articulo));
      else if (sortVal === 'antiguo') filtered.sort((a,b) => (parseDate(a.fecha) || new Date(0)) - (parseDate(b.fecha) || new Date(0)));
      else {
        filtered.sort((a,b) => (parseDate(b.fecha) || new Date(0)) - (parseDate(a.fecha) || new Date(0)));
      }

      filteredData = filtered;
      renderCards(filtered);
      updateStats();

      if (analysisPanel.style.display === 'block') {
        if (currentCardIndex >= filteredData.length) {
          analysisPanel.style.display = 'none';
        } else {
          const currentArticle = analysisArticleName.textContent;
          const idx = filteredData.findIndex(d => d.articulo === currentArticle);
          if (idx >= 0) showAnalysis(idx);
          else analysisPanel.style.display = 'none';
        }
      }
    }

    function updateStats() {
      const uniqueArt = new Set(allData.map(d => d.articulo));
      const uniqueFact = new Set(allData.map(d => d.factura));
      const uniqueEmp = new Set(allData.map(d => d.empresa));
      totalArticulos.textContent = uniqueArt.size;
      totalFacturas.textContent = uniqueFact.size;
      totalProveedores.textContent = uniqueEmp.size;
      const now = new Date();
      ultimaActualizacion.textContent = now.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    }

    async function init() {
      loader.style.display = 'flex';
      cardsGrid.style.display = 'none';
      noResults.style.display = 'none';
      analysisPanel.style.display = 'none';

      try {
        const data = await loadData();
        allData = data;
        filteredData = [...allData];
        loader.style.display = 'none';
        
        if (allData.length === 0) {
          noResults.style.display = 'block';
          noResults.innerHTML = '<i class="fas fa-exclamation-triangle" style="font-size:2rem; display:block;"></i> No se encontraron datos. Verifica que la hoja tenga datos y esté publicada.';
        } else {
          populateFilters();
          renderCards(allData);
          updateStats();
        }
      } catch (error) {
        loader.style.display = 'none';
        noResults.style.display = 'block';
        noResults.innerHTML = `<i class="fas fa-exclamation-circle" style="font-size:2rem; display:block;"></i> Error al cargar datos:<br><small>${error.message}</small><br><br>Verifica que la hoja esté publicada.`;
        console.error('Init error:', error);
      }

      searchInput.addEventListener('input', applyFiltersAndSort);
      filterProveedor.addEventListener('change', applyFiltersAndSort);
      filterFecha.addEventListener('change', applyFiltersAndSort);
      sortSelect.addEventListener('change', applyFiltersAndSort);

      clearBtn.addEventListener('click', function() {
        searchInput.value = '';
        filterProveedor.value = '';
        filterFecha.value = '';
        sortSelect.value = 'reciente';
        applyFiltersAndSort();
      });

      themeToggle.addEventListener('click', function() {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        themeLabel.textContent = isDark ? 'Modo claro' : 'Modo oscuro';
        themeToggle.innerHTML = `<i class="fas ${isDark ? 'fa-sun' : 'fa-moon'}"></i> ${isDark ? 'Claro' : 'Oscuro'}`;
      });

      backToTop.addEventListener('click', function() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });

      document.getElementById('printCardBtn').addEventListener('click', function() {
        window.print();
      });
      document.getElementById('exportPdfBtn').addEventListener('click', function() {
        alert('Para exportar a PDF, usa "Imprimir" y selecciona "Guardar como PDF" en el diálogo de impresión.');
      });
    }

    init();
  })();
</script>
