<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Industria San Carlos - Inventario</title>

<style>
:root{
    --verde-principal:#1e7d4f;
    --verde-secundario:#2fa36a;
    --verde-claro:#dff4e8;
    --gris:#f4f6f8;
    --oscuro:#1f2937;
    --blanco:#ffffff;
    --rojo:#dc2626;
    --amarillo:#f59e0b;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{
    background:var(--gris);
    color:var(--oscuro);
}

header{
    background:linear-gradient(135deg,var(--verde-principal),var(--verde-secundario));
    color:white;
    padding:15px;
    display:flex;
    align-items:center;
    gap:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

header img{
    width:60px;
    height:60px;
    object-fit:contain;
    background:white;
    border-radius:10px;
    padding:5px;
}

header h1{
    font-size:1.5rem;
}

header p{
    font-size:.9rem;
    opacity:.9;
}

.container{
    padding:20px;
    max-width:1400px;
    margin:auto;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-bottom:20px;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.card h3{
    color:var(--verde-principal);
    margin-bottom:10px;
}

.card .valor{
    font-size:2rem;
    font-weight:bold;
}

.formulario{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
    margin-bottom:20px;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:10px;
}

input,select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    border:none;
    cursor:pointer;
    padding:12px 16px;
    border-radius:8px;
    font-weight:bold;
}

.btn-agregar{
    background:var(--verde-principal);
    color:white;
}

.btn-exportar{
    background:#2563eb;
    color:white;
}

.btn-editar{
    background:var(--amarillo);
    color:white;
}

.btn-eliminar{
    background:var(--rojo);
    color:white;
}

.acciones{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-top:15px;
}

.buscador{
    margin-bottom:15px;
}

.buscador input{
    background:white;
}

.tabla-container{
    overflow-x:auto;
    background:white;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:var(--verde-principal);
    color:white;
}

th,td{
    padding:12px;
    text-align:left;
    border-bottom:1px solid #ddd;
}

.stock-bajo{
    color:var(--rojo);
    font-weight:bold;
}

.stock-normal{
    color:var(--verde-principal);
    font-weight:bold;
}

@media(max-width:768px){
    header{
        flex-direction:column;
        text-align:center;
    }

    .acciones{
        flex-direction:column;
    }

    button{
        width:100%;
    }
}
</style>
</head>

<body>

<header>
    <img src="logo.jpeg" alt="Logo"> 
    <div>
        <h1>Industria San Carlos</h1>
        <p>Ecosistema Líder en Tecnología Ecológica</p>
    </div>
</header>

<div class="container">

    <div class="dashboard">
        <div class="card">
            <h3>Total Productos</h3>
            <div class="valor" id="totalProductos">0</div>
        </div>

        <div class="card">
            <h3>Unidades en Inventario</h3>
            <div class="valor" id="totalUnidades">0</div>
        </div>

        <div class="card">
            <h3>Valor Inventario</h3>
            <div class="valor" id="valorInventario">$0</div>
        </div>

        <div class="card">
            <h3>Stock Bajo</h3>
            <div class="valor" id="stockBajo">0</div>
        </div>
    </div>

    <div class="formulario">
        <h2>Agregar Material</h2>
        <br>

        <div class="form-grid">
            <input type="text" id="nombre" placeholder="Nombre del material">

            <input type="text" id="codigo" placeholder="Código">

            <select id="categoria">
                <option>Herramientas</option>
                <option>Tornillería</option>
                <option>Electricidad</option>
                <option>PVC</option>
                <option>Pintura</option>
                <option>Construcción</option>
            </select>

            <input type="number" id="cantidad" placeholder="Cantidad">

            <input type="number" id="precio" placeholder="Precio Unitario">
        </div>

        <div class="acciones">
            <button class="btn-agregar" onclick="guardarProducto()">
                Guardar Producto
            </button>

            <button class="btn-exportar" onclick="exportarCSV()">
                Exportar CSV
            </button>
        </div>
    </div>

    <div class="buscador">
        <input
        type="text"
        id="buscar"
        placeholder="Buscar producto..."
        onkeyup="mostrarProductos()">
    </div>

    <div class="tabla-container">
        <table>
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Material</th>
                    <th>Categoría</th>
                    <th>Cantidad</th>
                    <th>Precio</th>
                    <th>Total</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>

            <tbody id="tablaInventario"></tbody>
        </table>
    </div>

</div>

<script>

let inventario =
JSON.parse(localStorage.getItem("inventarioISC")) || [];

let editando = null;

function guardarProducto(){

    const producto = {
        nombre: document.getElementById("nombre").value,
        codigo: document.getElementById("codigo").value,
        categoria: document.getElementById("categoria").value,
        cantidad: Number(document.getElementById("cantidad").value),
        precio: Number(document.getElementById("precio").value)
    };

    if(
        !producto.nombre ||
        !producto.codigo ||
        producto.cantidad <= 0 ||
        producto.precio <= 0
    ){
        alert("Complete todos los campos.");
        return;
    }

    if(editando !== null){
        inventario[editando] = producto;
        editando = null;
    }else{
        inventario.push(producto);
    }

    localStorage.setItem(
        "inventarioISC",
        JSON.stringify(inventario)
    );

    limpiarFormulario();
    mostrarProductos();
}

function mostrarProductos(){

    let filtro =
    document.getElementById("buscar")
    .value
    .toLowerCase();

    let tabla =
    document.getElementById("tablaInventario");

    tabla.innerHTML = "";

    let totalUnidades = 0;
    let valorInventario = 0;
    let stockBajo = 0;

    inventario.forEach((p,index)=>{

        if(
            !p.nombre.toLowerCase().includes(filtro) &&
            !p.codigo.toLowerCase().includes(filtro)
        ){
            return;
        }

        totalUnidades += p.cantidad;
        valorInventario += p.cantidad * p.precio;

        let estado = "";

        if(p.cantidad < 10){
            estado = '<span class="stock-bajo">Bajo</span>';
            stockBajo++;
        }else{
            estado = '<span class="stock-normal">Normal</span>';
        }

        tabla.innerHTML += `
        <tr>
            <td>${p.codigo}</td>
            <td>${p.nombre}</td>
            <td>${p.categoria}</td>
            <td>${p.cantidad}</td>
            <td>$${p.precio.toFixed(2)}</td>
            <td>$${(p.cantidad*p.precio).toFixed(2)}</td>
            <td>${estado}</td>
            <td>
                <button class="btn-editar"
                onclick="editarProducto(${index})">
                Editar
                </button>

                <button class="btn-eliminar"
                onclick="eliminarProducto(${index})">
                Eliminar
                </button>
            </td>
        </tr>
        `;
    });

    document.getElementById("totalProductos").textContent =
    inventario.length;

    document.getElementById("totalUnidades").textContent =
    totalUnidades;

    document.getElementById("valorInventario").textContent =
    "$" + valorInventario.toFixed(2);

    document.getElementById("stockBajo").textContent =
    stockBajo;
}

function editarProducto(index){

    let p = inventario[index];

    document.getElementById("nombre").value =
    p.nombre;

    document.getElementById("codigo").value =
    p.codigo;

    document.getElementById("categoria").value =
    p.categoria;

    document.getElementById("cantidad").value =
    p.cantidad;

    document.getElementById("precio").value =
    p.precio;

    editando = index;
}

function eliminarProducto(index){

    if(confirm("¿Eliminar producto?")){

        inventario.splice(index,1);

        localStorage.setItem(
            "inventarioISC",
            JSON.stringify(inventario)
        );

        mostrarProductos();
    }
}

function limpiarFormulario(){

    document.getElementById("nombre").value = "";
    document.getElementById("codigo").value = "";
    document.getElementById("cantidad").value = "";
    document.getElementById("precio").value = "";
}

function exportarCSV(){

    let csv =
    "Codigo,Nombre,Categoria,Cantidad,Precio\n";

    inventario.forEach(p=>{
        csv += `${p.codigo},${p.nombre},${p.categoria},${p.cantidad},${p.precio}\n`;
    });

    const blob =
    new Blob([csv], {type:'text/csv'});

    const a =
    document.createElement('a');

    a.href =
    URL.createObjectURL(blob);

    a.download =
    "inventario_industria_san_carlos.csv";

    a.click();
}

mostrarProductos();

</script>

</body>
</html>
