<!DOCTYPE html>
<html>

<head>

    <title>Task List</title>

    <link rel="stylesheet" href="compras.css">

</head>


<body>
<a href="index.html" class="backButton">
    ← Inicio
</a>

<div id="loginBox" class="login-overlay">

    <div class="login-card">

        <h2>Acceso</h2>

        <input 
            id="passwordInput"
            type="password"
            placeholder="Contraseña"
        >

        <button id="btnAdmin">
            Entrar
        </button>


        <button id="btnInvitado">
            Entrar como invitado
        </button>

        <p id="loginError"></p>

    </div>

</div>

<div class="desk">


    <div class="notebook">


        <div class="spiral"></div>


        <header class="header">

            <div class="empresa">
                INDUSTRIAS SAN CARLOS
            </div>

            <h1>
                Lista de tareas
            </h1>

            <p>
                Organización diaria
            </p>

        </header>



        <main class="page">


            <div class="margin-line"></div>


            <div class="task-form">

                <input 
                    id="nuevaTarea"
                    type="text"
                    placeholder="Escribe una nueva tarea..."
                >


                <button id="btnAgregar">
                    Agregar
                </button>


            </div>



            <ul id="listaTareas"></ul>



        </main>


    </div>


</div>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="compras.js"></script>


</body>

</html>
